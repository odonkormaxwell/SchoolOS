openapi: 3.1.0
info:
  title: Api
  version: 0.1.0
  description: Ghana School Management System API
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: auth
    description: Authentication
  - name: school
    description: School profile
  - name: academicYears
    description: Academic years
  - name: terms
    description: Academic terms
  - name: classes
    description: School classes
  - name: subjects
    description: Subjects
  - name: students
    description: Student management
  - name: teachers
    description: Teacher management
  - name: attendance
    description: Daily attendance
  - name: fees
    description: Fee management
  - name: results
    description: Terminal results and report cards
  - name: reports
    description: Summary reports and analytics
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  /auth/login:
    post:
      operationId: login
      tags: [auth]
      summary: Login
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LoginBody"
      responses:
        "200":
          description: Login successful
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthUser"
        "401":
          description: Invalid credentials

  /auth/logout:
    post:
      operationId: logout
      tags: [auth]
      summary: Logout
      responses:
        "204":
          description: Logged out

  /auth/me:
    get:
      operationId: getMe
      tags: [auth]
      summary: Get current user
      responses:
        "200":
          description: Current user
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthUser"
        "401":
          description: Not authenticated

  /school:
    get:
      operationId: getSchoolProfile
      tags: [school]
      summary: Get school profile
      responses:
        "200":
          description: School profile
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SchoolProfile"
    put:
      operationId: updateSchoolProfile
      tags: [school]
      summary: Update school profile
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateSchoolProfileBody"
      responses:
        "200":
          description: Updated school profile
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SchoolProfile"

  /academic-years:
    get:
      operationId: listAcademicYears
      tags: [academicYears]
      summary: List academic years
      responses:
        "200":
          description: List of academic years
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/AcademicYear"
    post:
      operationId: createAcademicYear
      tags: [academicYears]
      summary: Create academic year
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateAcademicYearBody"
      responses:
        "201":
          description: Created academic year
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AcademicYear"

  /academic-years/{id}:
    get:
      operationId: getAcademicYear
      tags: [academicYears]
      summary: Get academic year
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Academic year
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AcademicYear"
        "404":
          description: Not found
    put:
      operationId: updateAcademicYear
      tags: [academicYears]
      summary: Update academic year
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateAcademicYearBody"
      responses:
        "200":
          description: Updated academic year
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AcademicYear"
    delete:
      operationId: deleteAcademicYear
      tags: [academicYears]
      summary: Delete academic year
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  /academic-years/{id}/set-current:
    post:
      operationId: setCurrentAcademicYear
      tags: [academicYears]
      summary: Set as current academic year
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Updated academic year
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AcademicYear"

  /terms:
    get:
      operationId: listTerms
      tags: [terms]
      summary: List terms
      parameters:
        - name: academicYearId
          in: query
          required: false
          schema:
            type: integer
      responses:
        "200":
          description: List of terms
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Term"
    post:
      operationId: createTerm
      tags: [terms]
      summary: Create term
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateTermBody"
      responses:
        "201":
          description: Created term
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Term"

  /terms/{id}:
    put:
      operationId: updateTerm
      tags: [terms]
      summary: Update term
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateTermBody"
      responses:
        "200":
          description: Updated term
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Term"
    delete:
      operationId: deleteTerm
      tags: [terms]
      summary: Delete term
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  /terms/{id}/set-current:
    post:
      operationId: setCurrentTerm
      tags: [terms]
      summary: Set as current term
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Updated term
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Term"

  /classes:
    get:
      operationId: listClasses
      tags: [classes]
      summary: List classes
      responses:
        "200":
          description: List of classes
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/SchoolClass"
    post:
      operationId: createClass
      tags: [classes]
      summary: Create class
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateClassBody"
      responses:
        "201":
          description: Created class
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SchoolClass"

  /classes/{id}:
    put:
      operationId: updateClass
      tags: [classes]
      summary: Update class
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateClassBody"
      responses:
        "200":
          description: Updated class
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SchoolClass"
    delete:
      operationId: deleteClass
      tags: [classes]
      summary: Delete class
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  /subjects:
    get:
      operationId: listSubjects
      tags: [subjects]
      summary: List subjects
      responses:
        "200":
          description: List of subjects
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Subject"
    post:
      operationId: createSubject
      tags: [subjects]
      summary: Create subject
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateSubjectBody"
      responses:
        "201":
          description: Created subject
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Subject"

  /subjects/{id}:
    put:
      operationId: updateSubject
      tags: [subjects]
      summary: Update subject
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateSubjectBody"
      responses:
        "200":
          description: Updated subject
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Subject"
    delete:
      operationId: deleteSubject
      tags: [subjects]
      summary: Delete subject
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  /students:
    get:
      operationId: listStudents
      tags: [students]
      summary: List students
      parameters:
        - name: classId
          in: query
          required: false
          schema:
            type: integer
        - name: search
          in: query
          required: false
          schema:
            type: string
      responses:
        "200":
          description: List of students
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Student"
    post:
      operationId: createStudent
      tags: [students]
      summary: Create student
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateStudentBody"
      responses:
        "201":
          description: Created student
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Student"

  /students/{id}:
    get:
      operationId: getStudent
      tags: [students]
      summary: Get student
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Student
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Student"
        "404":
          description: Not found
    put:
      operationId: updateStudent
      tags: [students]
      summary: Update student
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateStudentBody"
      responses:
        "200":
          description: Updated student
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Student"
    delete:
      operationId: deleteStudent
      tags: [students]
      summary: Delete student
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  /teachers:
    get:
      operationId: listTeachers
      tags: [teachers]
      summary: List teachers
      parameters:
        - name: search
          in: query
          required: false
          schema:
            type: string
      responses:
        "200":
          description: List of teachers
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Teacher"
    post:
      operationId: createTeacher
      tags: [teachers]
      summary: Create teacher
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateTeacherBody"
      responses:
        "201":
          description: Created teacher
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Teacher"

  /teachers/{id}:
    get:
      operationId: getTeacher
      tags: [teachers]
      summary: Get teacher
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Teacher
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Teacher"
        "404":
          description: Not found
    put:
      operationId: updateTeacher
      tags: [teachers]
      summary: Update teacher
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateTeacherBody"
      responses:
        "200":
          description: Updated teacher
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Teacher"
    delete:
      operationId: deleteTeacher
      tags: [teachers]
      summary: Delete teacher
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  /class-assignments:
    get:
      operationId: listClassAssignments
      tags: [classes]
      summary: List class-teacher and class-subject assignments
      parameters:
        - name: classId
          in: query
          required: false
          schema:
            type: integer
        - name: academicYearId
          in: query
          required: false
          schema:
            type: integer
        - name: termId
          in: query
          required: false
          schema:
            type: integer
      responses:
        "200":
          description: List of class assignments
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ClassAssignment"
    post:
      operationId: createClassAssignment
      tags: [classes]
      summary: Assign teacher to class/subject
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateClassAssignmentBody"
      responses:
        "201":
          description: Created assignment
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ClassAssignment"

  /class-assignments/{id}:
    delete:
      operationId: deleteClassAssignment
      tags: [classes]
      summary: Remove class assignment
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  /attendance:
    get:
      operationId: listAttendance
      tags: [attendance]
      summary: List attendance records
      parameters:
        - name: classId
          in: query
          required: false
          schema:
            type: integer
        - name: date
          in: query
          required: false
          schema:
            type: string
            format: date
        - name: termId
          in: query
          required: false
          schema:
            type: integer
        - name: studentId
          in: query
          required: false
          schema:
            type: integer
      responses:
        "200":
          description: Attendance records
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/AttendanceRecord"
    post:
      operationId: markAttendance
      tags: [attendance]
      summary: Mark attendance for a class on a date (bulk)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/MarkAttendanceBody"
      responses:
        "201":
          description: Attendance marked
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/AttendanceRecord"

  /attendance/summary:
    get:
      operationId: getAttendanceSummary
      tags: [attendance]
      summary: Get attendance summary by class and term
      parameters:
        - name: classId
          in: query
          required: false
          schema:
            type: integer
        - name: termId
          in: query
          required: false
          schema:
            type: integer
        - name: studentId
          in: query
          required: false
          schema:
            type: integer
      responses:
        "200":
          description: Attendance summary
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/AttendanceSummary"

  /fee-types:
    get:
      operationId: listFeeTypes
      tags: [fees]
      summary: List fee types
      responses:
        "200":
          description: Fee types
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/FeeType"
    post:
      operationId: createFeeType
      tags: [fees]
      summary: Create fee type
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateFeeTypeBody"
      responses:
        "201":
          description: Created fee type
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/FeeType"

  /fee-types/{id}:
    put:
      operationId: updateFeeType
      tags: [fees]
      summary: Update fee type
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateFeeTypeBody"
      responses:
        "200":
          description: Updated fee type
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/FeeType"
    delete:
      operationId: deleteFeeType
      tags: [fees]
      summary: Delete fee type
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  /fee-assignments:
    get:
      operationId: listFeeAssignments
      tags: [fees]
      summary: List fee assignments (what fees apply to which class/term)
      parameters:
        - name: classId
          in: query
          required: false
          schema:
            type: integer
        - name: termId
          in: query
          required: false
          schema:
            type: integer
      responses:
        "200":
          description: Fee assignments
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/FeeAssignment"
    post:
      operationId: createFeeAssignment
      tags: [fees]
      summary: Assign fee to class/term
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateFeeAssignmentBody"
      responses:
        "201":
          description: Created fee assignment
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/FeeAssignment"

  /fee-assignments/{id}:
    delete:
      operationId: deleteFeeAssignment
      tags: [fees]
      summary: Delete fee assignment
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  /payments:
    get:
      operationId: listPayments
      tags: [fees]
      summary: List payments
      parameters:
        - name: studentId
          in: query
          required: false
          schema:
            type: integer
        - name: termId
          in: query
          required: false
          schema:
            type: integer
        - name: classId
          in: query
          required: false
          schema:
            type: integer
      responses:
        "200":
          description: Payments
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Payment"
    post:
      operationId: createPayment
      tags: [fees]
      summary: Record a fee payment
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreatePaymentBody"
      responses:
        "201":
          description: Payment recorded
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Payment"

  /payments/{id}:
    get:
      operationId: getPayment
      tags: [fees]
      summary: Get payment / receipt
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Payment
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Payment"
        "404":
          description: Not found
    delete:
      operationId: deletePayment
      tags: [fees]
      summary: Void/delete payment
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  /fee-balances:
    get:
      operationId: listFeeBalances
      tags: [fees]
      summary: Get fee balances and arrears per student
      parameters:
        - name: classId
          in: query
          required: false
          schema:
            type: integer
        - name: termId
          in: query
          required: false
          schema:
            type: integer
        - name: studentId
          in: query
          required: false
          schema:
            type: integer
      responses:
        "200":
          description: Fee balances
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/FeeBalance"

  /results:
    get:
      operationId: listResults
      tags: [results]
      summary: List terminal results
      parameters:
        - name: classId
          in: query
          required: false
          schema:
            type: integer
        - name: termId
          in: query
          required: false
          schema:
            type: integer
        - name: studentId
          in: query
          required: false
          schema:
            type: integer
        - name: subjectId
          in: query
          required: false
          schema:
            type: integer
      responses:
        "200":
          description: Results
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Result"
    post:
      operationId: createResult
      tags: [results]
      summary: Record a student result
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateResultBody"
      responses:
        "201":
          description: Result recorded
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Result"

  /results/{id}:
    put:
      operationId: updateResult
      tags: [results]
      summary: Update a result
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateResultBody"
      responses:
        "200":
          description: Updated result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Result"
    delete:
      operationId: deleteResult
      tags: [results]
      summary: Delete result
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  /results/bulk:
    post:
      operationId: bulkCreateResults
      tags: [results]
      summary: Bulk enter results for a class/subject/term
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/BulkCreateResultsBody"
      responses:
        "201":
          description: Results created
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Result"

  /report-cards:
    get:
      operationId: listReportCards
      tags: [results]
      summary: Get report card data (aggregated results per student per term)
      parameters:
        - name: studentId
          in: query
          required: false
          schema:
            type: integer
        - name: classId
          in: query
          required: false
          schema:
            type: integer
        - name: termId
          in: query
          required: false
          schema:
            type: integer
      responses:
        "200":
          description: Report cards
          content:
