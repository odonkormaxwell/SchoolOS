            application/json:
              schema:
                $ref: "#/components/schemas/DashboardStats"

  /reports/attendance:
    get:
      operationId: getAttendanceReport
      tags: [reports]
      summary: Attendance report by class and term
      parameters:
        - name: classId
          in: query
          required: false
          schema:
            type: integer
        - name: termId
          in: query
          required: false
          schema:
            type: integer
      responses:
        "200":
          description: Attendance report
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/AttendanceSummary"

  /reports/fees:
    get:
      operationId: getFeesReport
      tags: [reports]
      summary: Fee collection report by class and term
      parameters:
        - name: classId
          in: query
          required: false
          schema:
            type: integer
        - name: termId
          in: query
          required: false
          schema:
            type: integer
      responses:
        "200":
          description: Fee report
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/FeesReport"

  /reports/results:
    get:
      operationId: getResultsReport
      tags: [reports]
      summary: Results/performance report by class and term
      parameters:
        - name: classId
          in: query
          required: false
          schema:
            type: integer
        - name: termId
          in: query
          required: false
          schema:
            type: integer
      responses:
        "200":
          description: Results report
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ClassResultSummary"

  /users:
    get:
      operationId: listUsers
      tags: [auth]
      summary: List all system users
      responses:
        "200":
          description: Users
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/SystemUser"
    post:
      operationId: createUser
      tags: [auth]
      summary: Create a system user
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateUserBody"
      responses:
        "201":
          description: Created user
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SystemUser"

  /users/{id}:
    put:
      operationId: updateUser
      tags: [auth]
      summary: Update a system user
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateUserBody"
      responses:
        "200":
          description: Updated user
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SystemUser"
    delete:
      operationId: deleteUser
      tags: [auth]
      summary: Delete a system user
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

